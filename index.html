<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySignet by Jesse Sky — The Sky on the Day You Were Born, Cast in Metal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #08090c;
    --deep: #0d0f15;
    --card: #12141c;
    --border: rgba(196,160,90,0.18);
    --gold: #c4a05a;
    --gold-light: #e8d08a;
    --gold-dim: rgba(196,160,90,0.45);
    --cream: #f0e8d5;
    --text: #d8cfc0;
    --muted: #7a7468;
    --cinzel: 'Cinzel', 'Palatino Linotype', Palatino, serif;
    --cormorant: 'Cormorant Garamond', Georgia, serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--black); color:var(--text); font-family:var(--cormorant); font-size:18px; line-height:1.7; overflow-x:hidden; }

  #starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .section { position:relative; z-index:1; }
  .container { max-width:860px; margin:0 auto; padding:0 2rem; }
  
  /* HERO */
  .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:5rem 2rem 3rem; }
  .hero__title { font-family:var(--cinzel); font-size:clamp(2.8rem,8vw,6rem); color:var(--cream); letter-spacing:.06em; margin-bottom:1rem; }
  .hero__tagline { font-family:var(--cormorant); font-style:italic; font-size:clamp(1.1rem,3vw,1.65rem); color:var(--gold-light); margin-bottom:1.2rem; }

  /* ORRERY */
  .orrery-section { padding:2rem 0; text-align:center; }
  .orrery-diagram { position:relative; width:min(480px,92vw); height:min(480px,92vw); margin: 0 auto; }
  .orrery-diagram svg { width:100%; height:100%; }

  /* CONFIGURATOR */
  .configurator { padding:4rem 0; background: var(--deep); }
  .wizard { max-width:720px; margin:0 auto; padding: 2.5rem; border: 1px solid var(--border); background: var(--card); }
  .wizard__panel { display:none; }
  .wizard__panel.active { display:block; animation: fadeIn 0.5s ease; }
  
  .field-group { margin-bottom:1.5rem; text-align:left; }
  .field-label { font-family:var(--cinzel); font-size:.6rem; letter-spacing:.3em; color:var(--gold); text-transform:uppercase; display:block; margin-bottom:.6rem; }
  .field-input { width:100%; background:var(--black); border:1px solid var(--border); color:var(--cream); padding:.9rem; outline:none; font-family: inherit; }
  
  .btn-next { background:var(--gold); color:var(--black); padding: 1.1rem; border:none; cursor:pointer; font-family:var(--cinzel); letter-spacing: 0.2em; text-transform: uppercase; width: 100%; margin-top: 1rem; transition: background 0.3s; }
  .btn-next:hover { background: var(--gold-light); }
  
  .loading-msg { color: var(--gold); font-style: italic; margin-top: 1rem; display: none; font-size: 0.9rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<section class="hero section">
  <div class="container">
    <h1 class="hero__title">SkySignet</h1>
    <p class="hero__tagline">The sky on the day you were born, cast in metal.</p>
  </div>
</section>

<section class="orrery-section section">
  <div class="orrery-diagram" id="orrery-container">
    <svg viewBox="0 0 500 500" id="orrery-svg">
      <circle cx="250" cy="250" r="240" fill="none" stroke="rgba(196,160,90,0.1)" stroke-width="1" />
      <circle cx="250" cy="250" r="40" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="70" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="100" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="130" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="160" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="190" fill="none" stroke="var(--border)" />
      <circle cx="250" cy="250" r="220" fill="none" stroke="var(--border)" />
      
      <g id="planet-Moon" style="transition: transform 2s ease-in-out;"><circle cx="250" cy="210" r="4" fill="var(--gold-light)" /><text x="250" y="202" fill="var(--gold)" font-size="12" text-anchor="middle">☽</text></g>
      <g id="planet-Mercury" style="transition: transform 2.2s ease-in-out;"><circle cx="250" cy="180" r="4" fill="var(--gold-light)" /><text x="250" y="172" fill="var(--gold)" font-size="12" text-anchor="middle">☿</text></g>
      <g id="planet-Venus" style="transition: transform 2.4s ease-in-out;"><circle cx="250" cy="150" r="4" fill="var(--gold-light)" /><text x="250" y="142" fill="var(--gold)" font-size="12" text-anchor="middle">♀</text></g>
      <g id="planet-Sun" style="transition: transform 1.8s ease-in-out;"><circle cx="250" cy="120" r="6" fill="var(--gold-light)" /><text x="250" y="110" fill="var(--gold)" font-size="14" text-anchor="middle">☉</text></g>
      <g id="planet-Mars" style="transition: transform 2.6s ease-in-out;"><circle cx="250" cy="90" r="4" fill="var(--gold-light)" /><text x="250" y="82" fill="var(--gold)" font-size="12" text-anchor="middle">♂</text></g>
      <g id="planet-Jupiter" style="transition: transform 2.8s ease-in-out;"><circle cx="250" cy="60" r="5" fill="var(--gold-light)" /><text x="250" y="52" fill="var(--gold)" font-size="14" text-anchor="middle">♃</text></g>
      <g id="planet-Saturn" style="transition: transform 3s ease-in-out;"><circle cx="250" cy="30" r="5" fill="var(--gold-light)" /><text x="250" y="22" fill="var(--gold)" font-size="14" text-anchor="middle">♄</text></g>
    </svg>
  </div>
</section>

<section class="configurator section">
  <div class="wizard">
    <div class="wizard__panel active" id="step-1">
      <h2 class="field-label">The Moment of Arrival</h2>
      <div class="field-group">
        <label class="field-label">Birth Date</label>
        <input type="date" id="birthdate" class="field-input">
      </div>
      <div class="field-group">
        <label class="field-label">Birth Time</label>
        <input type="time" id="birthtime" class="field-input">
      </div>
      <div class="field-group">
        <label class="field-label">Birthplace (City, Country)</label>
        <input type="text" id="birthplace" class="field-input" placeholder="e.g. Newport, RI">
      </div>
      <button class="btn-next" onclick="processBirthData()">Calculate My Chart</button>
      <div id="loading" class="loading-msg">Consulting the ancient ephemeris...</div>
    </div>

    <div class="wizard__panel" id="step-2">
      <h2 class="field-label">Choose Your Wisdom</h2>
      <p style="margin-bottom: 1.5rem; font-style: italic; color: var(--muted);">How shall the stars be measured?</p>
      <button class="btn-next" onclick="setSystem('tropical')">Western Tropical</button>
      <button class="btn-next" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-top: 0.5rem;" onclick="setSystem('vedic')">Vedic Sidereal (Lahiri)</button>
    </div>
  </div>
</section>

<script>
  let state = {
    birthdate: '',
    birthtime: '',
    birthplace: '',
    system: 'tropical',
    lat: null,
    lon: null,
    positions: {}
  };

  async function processBirthData() {
    const bd = document.getElementById('birthdate').value;
    const bt = document.getElementById('birthtime').value;
    const bp = document.getElementById('birthplace').value;
    const loader = document.getElementById('loading');

    if(!bd || !bt || !bp) {
      alert("Please provide complete birth details.");
      return;
    }

    state.birthdate = bd;
    state.birthtime = bt;
    state.birthplace = bp;
    loader.style.display = 'block';

    try {
      // 1. Geocoding via Nominatim
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(bp)}`);
      const geoData = await geoRes.json();
      if (geoData.length === 0) throw new Error("Location not found. Please try a major city.");
      
      state.lat = geoData[0].lat;
      state.lon = geoData[0].lon;

      // 2. Fetch Initial Calculation
      await fetchChart();
      
      // Move to Step 2
      document.getElementById('step-1').classList.remove('active');
      document.getElementById('step-2').classList.add('active');
    } catch (e) {
      alert("Error: " + e.message);
    } finally {
      loader.style.display = 'none';
    }
  }

  async function setSystem(sys) {
    state.system = sys;
    await fetchChart();
    alert(`The Orrery has been adjusted to the ${sys.toUpperCase()} system.`);
  }

  async function fetchChart() {
    // This calls your Vercel Python API
    const url = `/api/calculate?date=${state.birthdate}&time=${state.birthtime}&lat=${state.lat}&lon=${state.lon}&system=${state.system}`;
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("API failed to calculate.");
        const positions = await response.json();
        state.positions = positions;
        updateOrrery(positions);
    } catch (err) {
        console.error(err);
        alert("Calculation error. Is the /api/calculate.py file deployed?");
    }
  }

  function updateOrrery(positions) {
    for (const [planet, degrees] of Object.entries(positions)) {
      const el = document.getElementById(`planet-${planet}`);
      if (el) {
        // Rotate the planet group around the center point (250, 250)
        el.setAttribute('transform', `rotate(${degrees}, 250, 250)`);
      }
    }
  }

  // STARFIELD BACKGROUND
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for(let i=0; i<150; i++) {
    stars.push({ 
        x: Math.random()*canvas.width, 
        y: Math.random()*canvas.height, 
        r: Math.random()*1.2, 
        o: Math.random(),
        v: Math.random() * 0.01 
    });
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      ctx.globalAlpha = s.o;
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
      // Subtle twinkle
      s.o += s.v;
      if(s.o > 1 || s.o < 0) s.v *= -1;
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>

</body>
</html>
