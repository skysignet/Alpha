<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commission Received — SkySignet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #08090c;
      --gold: #C4A05A;
      --gold-light: #d4b86a;
      --cream: #e8dfc8;
      --muted: rgba(232,223,200,0.45);
      --cinzel: 'Cinzel', serif;
      --cormorant: 'Cormorant Garamond', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--black);
      color: var(--cream);
      font-family: var(--cormorant);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 520px; }
    .glyph {
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: .2em;
      margin-bottom: 2rem;
      display: block;
    }
    h1 {
      font-family: var(--cinzel);
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 1.5rem;
    }
    p {
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .sub {
      font-size: .9rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 1.5rem;
    }
    .mark {
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: .15em;
      margin-bottom: 2rem;
    }
    .gold {
      color: var(--gold-light);
    }
    a {
      color: var(--gold);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .back {
      display: inline-block;
      margin-top: 2rem;
      font-size: .9rem;
      letter-spacing: .1em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="mark">✦ &nbsp; Commission Received &nbsp; ✦</p>
    <h1>Your commission has been received and the work has begun.</h1>
    <p>A receipt has been sent to your email.</p>
    <p class="gold">We will be in touch shortly.</p>
    <a href="/" class="back">← Return to SkySignet</a>
  </div>
</body>
</html>
